experiment_id: mantis_pilot_v0

input:
  horizon_s:            5.0
  window_s:             0.5
  neutral_tail_s:       8.0
  channels:             [roll, pitch, yaw, throttle]
  min_value:            -1.0
  max_value:            1.0
  max_delta_per_window: 0.5
  perturb_delta:        0.08

properties:
  post_neutral_roll_rate:  {rate_max_radps: 0.35}
  post_neutral_pitch_rate: {rate_max_radps: 0.35}
  post_neutral_yaw_rate:   {rate_max_radps: 0.261799388}

scenarios:
  - id: px4_acro_roll
    platform: px4
    perturb_mode: ACRO
    observe_mode: ACRO
    staging_mode:
    test_mode: ACRO
    takeoff_alt_m: 5.0
    properties: [post_neutral_roll_rate, post_neutral_pitch_rate, post_neutral_yaw_rate]

  - id: px4_acro_pitch
    platform: px4
    perturb_mode: ACRO
    observe_mode: ACRO
    staging_mode:
    test_mode: ACRO
    takeoff_alt_m: 5.0
    properties: [post_neutral_roll_rate, post_neutral_pitch_rate, post_neutral_yaw_rate]

  - id: px4_stabilized_roll
    platform: px4
    perturb_mode: STABILIZED
    observe_mode: STABILIZED
    staging_mode:
    test_mode: STABILIZED
    takeoff_alt_m: 5.0
    properties: [post_neutral_roll_rate, post_neutral_pitch_rate, post_neutral_yaw_rate]

  - id: px4_stabilized_pitch
    platform: px4
    perturb_mode: STABILIZED
    observe_mode: STABILIZED
    staging_mode:
    test_mode: STABILIZED
    takeoff_alt_m: 5.0
    properties: [post_neutral_roll_rate, post_neutral_pitch_rate, post_neutral_yaw_rate]

  - id: ap_stabilize_roll
    platform: ardupilot
    perturb_mode: STABILIZE
    observe_mode: STABILIZE
    staging_mode:
    test_mode: STABILIZE
    takeoff_alt_m: 10.0
    properties: [post_neutral_roll_rate, post_neutral_pitch_rate, post_neutral_yaw_rate]

seeds: [0]

persistence_path:
  steps:               5
  top_m_update_groups: 3
  eta:                 0.06

simulator:
  px4:
    sim_speed_factor:   5.0
    mavlink_url:        udpin:127.0.0.1:14540
    manual_control_hz:  50
    cleanup_each_run:   true
  ardupilot:
    sim_speedup:        5.0
    direct_mavlink_url: tcp:127.0.0.1:5760
    mavlink_url:        udpin:127.0.0.1:14550
    manual_control_hz:  50
    cleanup_each_run:   true

logging:
  level:     INFO
  jsonl:     runs/mantis_pilot_v0/logs/queries.jsonl
